<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聆听平台 - 生产效能统计大盘</title>
    <style>
        :root {
            --primary-color: #1890ff;
            --bg-color: #f0f2f5;
            --text-color: #333;
            --border-color: #d9d9d9;
            --zone2-bg: #f6ffed; 
            --zone3-bg: #f0f5ff; 
            --status-total-color: #333333; /* 建议总数 - 浅青蓝 */
            --status-1-color: #8c8c8c;     /* 评估中 - 中性灰 */
            --status-2-color: #f5222d;     /* 未采纳 - 警示红 */
            --status-3-color: #1890ff;     /* 已采纳 - 科技蓝 */
            --status-4-color: #fa8c16;     /* 开发中 - 活力橙 */
            --status-5-color: #52c41a;     /* 已实现 - 成功绿 */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: var(--bg-color); color: var(--text-color); padding: 20px; }
        
        .header { background: #fff; padding: 16px 24px; border-radius: 4px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,21,41,.08); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; color: #1f1f1f; font-weight: 600; }

        .filter-panel { background: #fff; padding: 16px 24px; border-radius: 4px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,21,41,.08); display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        .filter-group { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .filter-group label { color: #595959; font-weight: bold; }
        .filter-group input { padding: 5px 12px; border: 1px solid var(--border-color); border-radius: 4px; outline: none; font-size: 14px; }
        
        .time-shortcuts { display: flex; gap: 6px; margin-right: 8px;}
        .shortcut-btn { background: #f5f5f5; color: #595959; border: 1px solid var(--border-color); padding: 4px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .shortcut-btn:hover, .shortcut-btn.active { background: var(--primary-color); color: #fff; border-color: var(--primary-color); }
        
        .btn-query { background: var(--primary-color); color: #fff; border: none; padding: 6px 24px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 500; margin-left: auto; }
        .btn-query:hover { background: #40a9ff; }

        /* 金刚区：6列网格样式完美统一 */
        .card-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; margin-bottom: 16px; }
        .stat-card { background: #fff; padding: 16px 20px; border-radius: 4px; box-shadow: 0 1px 4px rgba(0,21,41,.08); border-top: 4px solid #ccc; }
        
        /* 6个卡片边框色彩映射 */
        .stat-card.stotal { border-top-color: var(--status-total-color); }
        .stat-card.s1 { border-top-color: var(--status-1-color); }
        .stat-card.s2 { border-top-color: var(--status-2-color); }
        .stat-card.s3 { border-top-color: var(--status-3-color); }
        .stat-card.s4 { border-top-color: var(--status-4-color); }
        .stat-card.s5 { border-top-color: var(--status-5-color); }
        
        .stat-card .title { font-size: 14px; color: #595959; margin-bottom: 8px; font-weight: bold; }
        
        /* 6个卡片数字色彩严丝合缝对齐 */
        .stat-card.stotal .value { color: var(--status-total-color); font-size: 26px; font-weight: bold; }
        .stat-card.s1 .value { color: var(--status-1-color); font-size: 26px; font-weight: bold; }
        .stat-card.s2 .value { color: var(--status-2-color); font-size: 26px; font-weight: bold; }
        .stat-card.s3 .value { color: var(--status-3-color); font-size: 26px; font-weight: bold; }
        .stat-card.s4 .value { color: var(--status-4-color); font-size: 26px; font-weight: bold; }
        .stat-card.s5 .value { color: var(--status-5-color); font-size: 26px; font-weight: bold; }

        .dashboard-section { background: #fff; padding: 24px; border-radius: 4px; box-shadow: 0 1px 4px rgba(0,21,41,.08); margin-bottom: 16px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .section-title { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; border-left: 4px solid var(--primary-color); padding-left: 8px; }
        
        .t2-filters { display: flex; gap: 16px; align-items: center; font-size: 14px; }
        .t2-filters select { padding: 4px 8px; border: 1px solid var(--border-color); border-radius: 4px; outline: none; }

        .sort-trigger { cursor: pointer; user-select: none; transition: background 0.2s; position: relative; }
        .sort-trigger:hover { background: #f0f0f0 !important; }
        .sort-icon { font-size: 12px; margin-left: 4px; color: #bfbfbf; font-weight: normal; }
        th.active-sort { background: #e6f7ff !important; color: var(--primary-color) !important; }
        th.active-sort .sort-icon { color: var(--primary-color); }

        .table-container { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: center; font-size: 13px; min-width: 1350px; }
        th, td { border: 1px solid var(--border-color); padding: 10px 8px; vertical-align: middle; }
        tr:hover td { background: #fbfbfb; }
        
        th.zone-1 { background: #f5f5f5; color: #262626; font-weight: bold; }
        th.zone-2 { background: var(--zone2-bg); color: #237804; }
        th.zone-3 { background: var(--zone3-bg); color: #0050b3; }
        .sub-head th { background: #fafafa; font-weight: bold; color: #262626; }
        
        .bar-cell { position: relative; font-weight: bold; text-align: right; padding-right: 12px; z-index: 1; }
        .bar-cell::before {
            content: ''; position: absolute; left: 0; top: 15%; height: 70%;
            width: var(--bar-width, 0%);
            z-index: -1; border-radius: 0 2px 2px 0;
            transition: width 0.4s ease;
        }
        .bar-s1::before { background-color: #e8e8e8; } 
        .bar-s2::before { background-color: #ffccc7; } 
        .bar-s3::before { background-color: #bae7ff; } 
        .bar-s4::before { background-color: #ffd591; } 
        .bar-s5::before { background-color: #b7eb8f; } 

        .clickable-cell { color: var(--primary-color); font-weight: bold; cursor: pointer; text-decoration: underline; background: #f0f5ff; transition: all 0.2s;}
        .clickable-cell:hover { background: #bae7ff !important; color: #0050b3; }
        .active-drill { background: #ffe58f !important; font-weight: bold; color: #d46b08; box-shadow: inset 0 0 4px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="header">
        <h1>聆听平台统计大盘</h1>
    </div>

    <div class="filter-panel">
        <div class="filter-group">
            <label>建议反馈时间：</label>
            <div class="time-shortcuts">
                <button class="shortcut-btn active" onclick="setTimeRange('lastMonth', this)">上月</button>
                <button class="shortcut-btn" onclick="setTimeRange('thisMonth', this)">本月</button>
                <button class="shortcut-btn" onclick="setTimeRange('lastQuarter', this)">上季度</button>
                <button class="shortcut-btn" onclick="setTimeRange('thisQuarter', this)">本季度</button>
                <button class="shortcut-btn" onclick="setTimeRange('lastYear', this)">上年度</button>
                <button class="shortcut-btn" onclick="setTimeRange('thisYear', this)">本年度</button>
            </div>
            <input type="date" id="startDate" value="2026-05-01"> 
            <span style="color: #8c8c8c;">至</span> 
            <input type="date" id="endDate" value="2026-05-31">
        </div>
        <button class="btn-query">查询统计</button>
    </div>

    <div class="card-grid">
        <div class="stat-card stotal">
            <div class="title">建议总数</div>
            <div class="value">843</div>
        </div>
        <div class="stat-card s1">
            <div class="title">评估中</div>
            <div class="value">129</div>
        </div>
        <div class="stat-card s2">
            <div class="title">未采纳</div>
            <div class="value">60</div>
        </div>
        <div class="stat-card s3">
            <div class="title">已采纳</div>
            <div class="value">163</div>
        </div>
        <div class="stat-card s4">
            <div class="title">开发中</div>
            <div class="value">86</div>
        </div>
        <div class="stat-card s5">
            <div class="title">已实现</div>
            <div class="value">405</div>
        </div>
    </div>

    <div class="dashboard-section">
        <div class="section-title">分公司建议上报统计</div>
        <div class="table-container" style="margin-top: 16px;">
            <table>
                <thead>
                    <tr>
                        <th class="zone-1" rowspan="2" style="width: 12%;">分公司</th>
                        <th class="zone-2" colspan="6">建议处理情况</th>
                        <th class="zone-3" colspan="10">应用大类建议分布</th>
                    </tr>
                    <tr class="sub-head" id="t1SubHead">
                        <th class="sort-trigger" onclick="handleT1Sort('total', this)">建议总数<span class="sort-icon">↕</span></th>
                        <th class="sort-trigger" onclick="handleT1Sort('s1', this)">评估中<span class="sort-icon">↕</span></th>
                        <th class="sort-trigger" onclick="handleT1Sort('s2', this)">未采纳<span class="sort-icon">↕</span></th>
                        <th class="sort-trigger" onclick="handleT1Sort('s3', this)">已采纳<span class="sort-icon">↕</span></th>
                        <th class="sort-trigger" onclick="handleT1Sort('s4', this)">开发中<span class="sort-icon">↕</span></th>
                        <th class="sort-trigger" onclick="handleT1Sort('s5', this)">已实现<span class="sort-icon">↕</span></th>
                        <th class="sort-trigger" onclick="handleT1Sort('cat1', this)">销售营销<span class="sort-icon">↕</span></th>
                        <th class="sort-trigger" onclick="handleT1Sort('cat2', this)">承保业务<span class="sort-icon">↕</span></th>
                        <th class="sort-trigger" onclick="handleT1Sort('cat3', this)">核保业务<span class="sort-icon">↕</span></th>
                        <th class="sort-trigger" onclick="handleT1Sort('cat4', this)">履约业务<span class="sort-icon">↕</span></th>
                        <th class="sort-trigger" onclick="handleT1Sort('cat5', this)">资金财务<span class="sort-icon">↕</span></th>
                        <th class="sort-trigger" onclick="handleT1Sort('cat6', this)">后台支持<span class="sort-icon">↕</span></th>
                        <th class="sort-trigger" onclick="handleT1Sort('cat7', this)">运营管理<span class="sort-icon">↕</span></th>
                        <th class="sort-trigger" onclick="handleT1Sort('cat8', this)">数据中台<span class="sort-icon">↕</span></th>
                        <th class="sort-trigger" onclick="handleT1Sort('cat9', this)">通用板块<span class="sort-icon">↕</span></th>
                        <th class="sort-trigger" onclick="handleT1Sort('cat10', this)">战略企划<span class="sort-icon">↕</span></th>
                    </tr>
                </thead>
                <tbody id="table1Body">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="dashboard-section" id="detailSection">
        <div class="section-header">
            <div class="section-title">各应用建议处理进度</div>
            <div class="t2-filters">
                <label>分公司：</label>
                <select id="selectCompany" onchange="manualFilter()">
                    <option value="全部">全部</option>
                    <option value="中华财险总公司">中华财险总公司</option>
                    <option value="广东分公司">广东分公司</option>
                    <option value="北京分公司">北京分公司</option>
                </select>
                <label style="margin-left: 12px;">应用大类：</label>
                <select id="selectCategory" onchange="manualFilter()">
                    <option value="全部">全部</option>
                    <option value="销售营销">销售营销</option>
                    <option value="承保业务">承保业务</option>
                    <option value="核保业务">核保业务</option>
                    <option value="履约业务">履约业务</option>
                    <option value="资金财务">资金财务</option>
                    <option value="后台支持">后台支持</option>
                    <option value="运营管理">运营管理</option>
                    <option value="数据中台">数据中台</option>
                    <option value="通用板块">通用板块</option>
                    <option value="战略企划">战略企划</option>
                </select>
            </div>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr class="sub-head" id="t2SubHead">
                        <th style="width: 45%; text-align: left; padding-left:20px;">应用名称</th>
                        <th style="width: 11%;" class="sort-trigger" onclick="handleT2Sort('s1', this)">评估中<span class="sort-icon">↕</span></th>
                        <th style="width: 11%;" class="sort-trigger" onclick="handleT2Sort('s2', this)">未采纳<span class="sort-icon">↕</span></th>
                        <th style="width: 11%;" class="sort-trigger" onclick="handleT2Sort('s3', this)">已采纳<span class="sort-icon">↕</span></th>
                        <th style="width: 11%;" class="sort-trigger" onclick="handleT2Sort('s4', this)">开发中<span class="sort-icon">↕</span></th>
                        <th style="width: 11%;" class="sort-trigger" onclick="handleT2Sort('s5', this)">已实现<span class="sort-icon">↕</span></th>
                    </tr>
                </thead>
                <tbody id="detailTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        let table1Data = [
            { company: '广东分公司', total: 288, s1: 54, s2: 20, s3: 58, s4: 31, s5: 125, cat1: 45, cat2: 60, cat3: 25, cat4: 40, cat5: 30, cat6: 20, cat7: 35, cat8: 15, cat9: 10, cat10: 8 },
            { company: '中华财险总公司', total: 345, s1: 45, s2: 25, s3: 60, s4: 35, s5: 180, cat1: 55, cat2: 70, cat3: 35, cat4: 45, cat5: 40, cat6: 25, cat7: 30, cat8: 20, cat9: 15, cat10: 10 },
            { company: '北京分公司', total: 210, s1: 30, s2: 15, s3: 45, s4: 20, s5: 100, cat1: 35, cat2: 40, cat3: 15, cat4: 25, cat5: 20, cat6: 20, cat7: 25, cat8: 12, cat9: 10, cat10: 8 }
        ];

        const table2RawData = [
            { category: '销售营销', name: '新销管平台', s1: 5, s2: 2, s3: 8, s4: 5, s5: 25 },
            { category: '销售营销', name: '经代销管系统', s1: 2, s2: 1, s3: 4, s4: 3, s5: 15 },
            { category: '销售营销', name: '网销运营平台', s1: 3, s2: 1, s3: 4, s4: 2, s5: 5 },
            { category: '承保业务', name: '新一代承保核心系统', s1: 8, s2: 3, s3: 10, s4: 6, s5: 18 },
            { category: '承保业务', name: '出单辅助平台', s1: 2, s2: 1, s3: 2, s4: 2, s5: 3 },
            { category: '核保业务', name: '智能核保引擎', s1: 5, s2: 2, s3: 5, s4: 3, s5: 10 },
            { category: '核保业务', name: '规则管理平台', s1: 1, s2: 0, s3: 2, s4: 1, s5: 4 },
            { category: '履约业务', name: '统一理赔系统', s1: 10, s2: 2, s3: 15, s4: 8, s5: 25 },
            { category: '履约业务', name: '移动查勘定损助手', s1: 2, s2: 0, s3: 3, s4: 2, s5: 10 },
            { category: '资金财务', name: '资金收付系统', s1: 4, s2: 1, s3: 5, s4: 3, s5: 15 },
            { category: '资金财务', name: '财务总账系统', s1: 2, s2: 0, s3: 3, s4: 1, s5: 5 },
            { category: '后台支持', name: 'HR人事系统', s1: 2, s2: 0, s3: 2, s4: 1, s5: 4 },
            { category: '后台支持', name: 'OA协同办公平台', s1: 3, s2: 1, s3: 4, s4: 2, s5: 8 },
            { category: '运营管理', name: '效能监控系统', s1: 3, s2: 1, s3: 4, s4: 2, s5: 8 },
            { category: '运营管理', name: '客户工单系统', s1: 2, s2: 0, s3: 3, s4: 2, s5: 10 },
            { category: '数据中台', name: '数据湖平台', s1: 2, s2: 0, s3: 3, s4: 1, s5: 5 },
            { category: '数据中台', name: '报表分析中心', s1: 1, s2: 0, s3: 2, s4: 1, s5: 4 },
            { category: '通用板块', name: '统一认证权限中心', s1: 1, s2: 0, s3: 1, s4: 1, s5: 2 },
            { category: '通用板块', name: '统一影像平台', s1: 2, s2: 0, s3: 1, s4: 0, s5: 3 },
            { category: '战略企划', name: '全面预算管理系统', s1: 1, s2: 0, s3: 1, s4: 0, s5: 2 },
            { category: '战略企划', name: '经营分析驾驶舱', s1: 1, s2: 0, s3: 2, s4: 1, s5: 3 }
        ];

        let t1SortKey = '', t1SortOrder = 'desc';
        let t2SortKey = '', t2SortOrder = 'desc';
        let currentDrillCell = { company: null, category: null };

        window.onload = function() {
            renderTable1();
            renderTable2();
        };

        function renderTable1() {
            const tbody = document.getElementById('table1Body');
            
            const maxS1 = Math.max(...table1Data.map(d => d.s1), 1);
            const maxS2 = Math.max(...table1Data.map(d => d.s2), 1);
            const maxS3 = Math.max(...table1Data.map(d => d.s3), 1);
            const maxS4 = Math.max(...table1Data.map(d => d.s4), 1);
            const maxS5 = Math.max(...table1Data.map(d => d.s5), 1);

            let html = '';
            table1Data.forEach(row => {
                const w1 = (row.s1 / maxS1) * 100;
                const w2 = (row.s2 / maxS2) * 100;
                const w3 = (row.s3 / maxS3) * 100;
                const w4 = (row.s4 / maxS4) * 100;
                const w5 = (row.s5 / maxS5) * 100;

                html += `<tr>
                    <td style="font-weight: bold; background:#fafafa; text-align: left; padding-left:16px;">${row.company}</td>
                    <td style="font-weight:bold; color:var(--status-total-color);">${row.total}</td>
                    <td class="bar-cell bar-s1" style="--bar-width: ${w1}%;">${row.s1}</td>
                    <td class="bar-cell bar-s2" style="--bar-width: ${w2}%;">${row.s2}</td>
                    <td class="bar-cell bar-s3" style="--bar-width: ${w3}%;">${row.s3}</td>
                    <td class="bar-cell bar-s4" style="--bar-width: ${w4}%;">${row.s4}</td>
                    <td class="bar-cell bar-s5" style="--bar-width: ${w5}%;">${row.s5}</td>
                    <td class="clickable-cell ${currentDrillCell.company===row.company && currentDrillCell.category==='销售营销'?'active-drill':''}" onclick="doDrill('${row.company}', '销售营销', this)">${row.cat1}</td>
                    <td class="clickable-cell ${currentDrillCell.company===row.company && currentDrillCell.category==='承保业务'?'active-drill':''}" onclick="doDrill('${row.company}', '承保业务', this)">${row.cat2}</td>
                    <td class="clickable-cell ${currentDrillCell.company===row.company && currentDrillCell.category==='核保业务'?'active-drill':''}" onclick="doDrill('${row.company}', '核保业务', this)">${row.cat3}</td>
                    <td class="clickable-cell ${currentDrillCell.company===row.company && currentDrillCell.category==='履约业务'?'active-drill':''}" onclick="doDrill('${row.company}', '履约业务', this)">${row.cat4}</td>
                    <td class="clickable-cell ${currentDrillCell.company===row.company && currentDrillCell.category==='资金财务'?'active-drill':''}" onclick="doDrill('${row.company}', '资金财务', this)">${row.cat5}</td>
                    <td class="clickable-cell ${currentDrillCell.company===row.company && currentDrillCell.category==='后台支持'?'active-drill':''}" onclick="doDrill('${row.company}', '后台支持', this)">${row.cat6}</td>
                    <td class="clickable-cell ${currentDrillCell.company===row.company && currentDrillCell.category==='运营管理'?'active-drill':''}" onclick="doDrill('${row.company}', '运营管理', this)">${row.cat7}</td>
                    <td class="clickable-cell ${currentDrillCell.company===row.company && currentDrillCell.category==='数据中台'?'active-drill':''}" onclick="doDrill('${row.company}', '数据中台', this)">${row.cat8}</td>
                    <td class="clickable-cell ${currentDrillCell.company===row.company && currentDrillCell.category==='通用板块'?'active-drill':''}" onclick="doDrill('${row.company}', '通用板块', this)">${row.cat9}</td>
                    <td class="clickable-cell ${currentDrillCell.company===row.company && currentDrillCell.category==='战略企划'?'active-drill':''}" onclick="doDrill('${row.company}', '战略企划', this)">${row.cat10}</td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        function handleT1Sort(key, cell) {
            if (t1SortKey === key) {
                t1SortOrder = t1SortOrder === 'desc' ? 'asc' : 'desc';
            } else {
                t1SortKey = key;
                t1SortOrder = 'desc';
            }

            document.querySelectorAll('#t1SubHead th').forEach(th => {
                th.classList.remove('active-sort');
                const icon = th.querySelector('.sort-icon');
                if(icon) icon.innerText = '↕';
            });

            cell.classList.add('active-sort');
            cell.querySelector('.sort-icon').innerText = t1SortOrder === 'desc' ? '↓' : '↑';

            table1Data.sort((a, b) => t1SortOrder === 'desc' ? b[key] - a[key] : a[key] - b[key]);
            renderTable1();
        }

        function renderTable2() {
            const tbody = document.getElementById('detailTableBody');
            const company = document.getElementById('selectCompany').value;
            const category = document.getElementById('selectCategory').value;

            let processedData = table2RawData.filter(item => {
                if (category !== '全部' && item.category !== category) return false;
                return true;
            });

            processedData = JSON.parse(JSON.stringify(processedData));

            if (company !== '全部') {
                let seed = company.length;
                processedData.forEach(item => {
                    item.s1 = Math.max(0, item.s1 - (seed % 3));
                    item.s2 = Math.max(0, item.s2 - (seed % 2));
                    item.s3 = Math.max(0, item.s3 + (seed % 4));
                    item.s4 = Math.max(0, item.s4 + (seed % 3));
                    item.s5 = Math.max(0, item.s5 + (seed % 5));
                });
            }

            processedData.forEach(item => {
                if (category === '全部') {
                    item.displayName = `[${item.category}] ${item.name}`;
                } else {
                    item.displayName = item.name;
                }
            });

            if (t2SortKey) {
                processedData.sort((a, b) => t2SortOrder === 'desc' ? b[t2SortKey] - a[t2SortKey] : a[t2SortKey] - b[t2SortKey]);
            }

            if (processedData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="color:#999; padding: 40px;">当前筛选组合下无具体指标明细</td></tr>`;
                return;
            }

            let html = '';
            let totalS1 = 0, totalS2 = 0, totalS3 = 0, totalS4 = 0, totalS5 = 0;

            processedData.forEach(item => {
                totalS1 += item.s1; totalS2 += item.s2; totalS3 += item.s3; totalS4 += item.s4; totalS5 += item.s5;
                html += `<tr>
                    <td style="text-align: left; padding-left:20px; font-weight:500;">${item.displayName}</td>
                    <td>${item.s1}</td><td>${item.s2}</td><td>${item.s3}</td><td>${item.s4}</td><td>${item.s5}</td>
                </tr>`;
            });

            html += `<tr style="background:#fafafa; font-weight:bold;">
                <td style="text-align: left; padding-left:20px;">分类小计</td>
                <td>${totalS1}</td><td>${totalS2}</td><td>${totalS3}</td><td>${totalS4}</td><td>${totalS5}</td>
            </tr>`;

            tbody.innerHTML = html;
        }

        function handleT2Sort(key, cell) {
            if (t2SortKey === key) {
                t2SortOrder = t2SortOrder === 'desc' ? 'asc' : 'desc';
            } else {
                t2SortKey = key;
                t2SortOrder = 'desc';
            }

            document.querySelectorAll('#t2SubHead th').forEach(th => {
                if(th.classList.contains('sort-trigger')) {
                    th.classList.remove('active-sort');
                    th.querySelector('.sort-icon').innerText = '↕';
                }
            });

            cell.classList.add('active-sort');
            cell.querySelector('.sort-icon').innerText = t2SortOrder === 'desc' ? '↓' : '↑';

            renderTable2();
        }

        function doDrill(company, category, cellElement) {
            const allCells = document.querySelectorAll('.clickable-cell');
            allCells.forEach(c => c.classList.remove('active-drill'));
            if(cellElement) cellElement.classList.add('active-drill');
            
            currentDrillCell.company = company;
            currentDrillCell.category = category;

            document.getElementById('selectCompany').value = company;
            document.getElementById('selectCategory').value = category;
            
            renderTable2();
            document.getElementById('detailSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function manualFilter() {
            const allCells = document.querySelectorAll('.clickable-cell');
            allCells.forEach(c => c.classList.remove('active-drill'));

            currentDrillCell.company = null;
            currentDrillCell.category = null;

            renderTable2();
        }

        function setTimeRange(rangeType, btnElement) {
            const buttons = document.querySelectorAll('.shortcut-btn');
            buttons.forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            
            const startInput = document.getElementById('startDate');
            const endInput = document.getElementById('endDate');
            
            if(rangeType === 'lastMonth') { 
                startInput.value = "2026-05-01"; endInput.value = "2026-05-31";
            } 
            else if(rangeType === 'thisMonth') { 
                startInput.value = "2026-06-01"; endInput.value = "2026-06-11";
            } 
            else if(rangeType === 'lastQuarter') { 
                startInput.value = "2026-01-01"; endInput.value = "2026-03-31";
            } 
            else if(rangeType === 'thisQuarter') { 
                startInput.value = "2026-04-01"; endInput.value = "2026-06-11";
            }
            else if(rangeType === 'lastYear') { 
                startInput.value = "2025-01-01"; endInput.value = "2025-12-31";
            }
            else if(rangeType === 'thisYear') { 
                startInput.value = "2026-01-01"; endInput.value = "2026-06-11";
            }
        }
    </script>
</body>
</html>
