        .container { max-width: 1400px; margin: 25px auto; padding: 0 20px; }

        .search-input { flex: 1; padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 15px; outline: none; transition: border-color 0.2s; }

        .app-name { font-size: 16px; font-weight: bold; color: #1e293b; }
        
        .app-desc { font-size: 13px; color: #64748b; margin-bottom: 15px; min-height: 38px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .app-badges { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500; transition: all 0.2s; }
        .badge-update { background-color: #e0e7ff; color: #4338ca; border: 1px solid #c7d2fe; display: flex; align-items: center; gap: 4px; }

        .app-actions { display: flex; gap: 10px; border-top: 1px solid #f1f5f9; padding-top: 12px; }
        .btn-primary { flex: 1; background-color: #2563eb; color: #fff; text-align: center; padding: 8px 0; border-radius: 4px; font-size: 13px; text-decoration: none; font-weight: 500; }
        .btn-primary:hover { background-color: #1d4ed8; }
        .btn-secondary { flex: 1; background-color: #f8fafc; color: #475569; text-align: center; padding: 8px 0; border-radius: 4px; font-size: 13px; text-decoration: none; border: 1px solid #cbd5e1; font-weight: 500; }

        .detail-meta { display: flex; gap: 25px; font-size: 13px; color: #64748b; }

        .tab-btn:hover { color: #2563eb; }
        .tab-btn.active { color: #2563eb; border-bottom-color: #2563eb; background: #fff; font-weight: bold; }
        .tab-panel { display: none; padding: 30px; min-height: 350px; }
        .tab-panel.active { display: block; }

        /* 操作手册两栏结构 */

        .tree-node:hover { background-color: #f1f5f9; color: #1e293b; }
        .tree-node.active { background-color: #e0f2fe; color: #0369a1; font-weight: 500; }
        .tree-sub { padding-left: 18px; margin-bottom: 6px; }
        .doc-body { flex: 1; padding-left: 10px; }
        .doc-body h2 { margin-top: 0; font-size: 18px; color: #1e293b; border-bottom: 1px solid #f1f5f9; padding-bottom: 12px; }
        .doc-body p { font-size: 14px; color: #334155; line-height: 1.6; margin-bottom: 12px; }
        .doc-body ul, .doc-body ol { padding-left: 20px; color: #334155; font-size: 14px; line-height: 1.8; margin-bottom: 15px; }
        .doc-body strong { color: #0f172a; }
        .doc-highlight-box { background-color: #f8fafc; border-left: 4px solid #cbd5e1; padding: 12px 16px; margin: 15px 0; border-radius: 0 4px 4px 0; font-size: 13.5px; color: #475569; }

        /* 更新日志风琴式时间线 */
        .timeline { position: relative; padding-left: 30px; }
        .timeline::before { content: ''; position: absolute; left: 7px; top: 0; bottom: 0; width: 2px; background: #e2e8f0; }
        .timeline-item { position: relative; margin-bottom: 20px; }
        .timeline-dot { position: absolute; left: -27px; top: 12px; width: 10px; height: 10px; border-radius: 50%; background: #3b82f6; border: 2px solid #fff; }
        .timeline-header { display: flex; align-items: center; justify-content: space-between; background: #f8fafc; border: 1px solid #e2e8f0; padding: 10px 20px; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        .timeline-header:hover { background: #f1f5f9; }
        .timeline-title-left { display: flex; align-items: center; gap: 15px; }
        .timeline-version { font-size: 15px; font-weight: bold; color: #1e293b; }
        .timeline-date { font-size: 13px; color: #94a3b8; }
        .timeline-toggle-icon { font-size: 12px; color: #64748b; font-weight: bold; }
        .timeline-body { display: none; background: #fff; border: 1px solid #e2e8f0; border-top: none; border-radius: 0 0 6px 6px; padding: 15px 20px; margin-top: -2px; }
        .timeline-item.expanded .timeline-body { display: block; }
        .timeline-item.expanded .timeline-header { border-radius: 6px 6px 0 0; background: #f1f5f9; }
        .timeline-body ul { margin: 0; padding-left: 18px; font-size: 13px; color: #334155; line-height: 1.7; }

        /* 相关课程网格 */
        .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        .course-thumb .course-tag { font-size: 11px; background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 10px; margin-bottom: 10px; }
        .course-thumb .course-title-text { font-size: 14px; font-weight: bold; }
        .course-info { padding: 15px; }
        .course-meta { font-size: 12px; color: #64748b; margin-bottom: 15px; }
        .btn-course { display: block; text-align: center; background: #f1f5f9; color: #475569; padding: 8px 0; border-radius: 4px; font-size: 13px; text-decoration: none; font-weight: 500; }

        .form-group { margin-bottom: 25px; }
        .form-label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 12px; color: #334155; }
        
        /* 聆听平台卡片样式组 */
        .card-group { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: nowrap; }
        .type-card { flex: 1; background: #fff; border: 1px solid #e2e8f0; border-radius: 6px; padding: 16px; cursor: pointer; position: relative; transition: all 0.2s; box-sizing: border-box; display: flex; flex-direction: column; justify-content: flex-start; min-height: 120px; }
        .type-card:hover { border-color: #cbd5e1; background-color: #f8fafc; }
        
        .type-card.active { border-color: #b91c1c; background-color: #fef2f2; }

        .card-title { font-size: 14px; font-weight: bold; color: #1e293b; margin-bottom: 8px; }
        .card-desc { font-size: 12px; color: #64748b; line-height: 1.5; }
        
        .form-textarea-wrapper { max-width: 650px; }
        .form-textarea { width: 100%; height: 130px; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; outline: none; resize: vertical; box-sizing: border-box; }
        .form-textarea:focus { border-color: #3b82f6; }
        
        .btn-submit { background-color: #2563eb; color: #fff; border: none; padding: 11px 26px; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 4px rgba(37,99,235,0.15); transition: background-color 0.2s; }

        /* 隔离控制显示样式声明 */
        .hidden-layout { display: none !important; }
        .block-layout { display: block !important; }
        .flex-layout { display: flex !important; }
    </style>
</head>

function loadAppDetail(appId, defaultTab) {
    defaultTab = defaultTab || 0;
    var ta = null, fc = "";
    Object.keys(appsData).forEach(function(cat) {
        if (cat === "全部应用清单") return;
        var m = appsData[cat].find(function(a) { return a.id === appId; });
        if (m) { ta = m; fc = cat; }
    });
    if (!ta) return;
    var ds = document.getElementById("detailSection");
    ds.className = "detail-section block-layout";
    ds.style.display = "block";
    document.getElementById("det_appName").innerText = ta.name;
    document.getElementById("det_catName").innerText = fc;
    document.getElementById("det_appDesc").innerText = ta.desc;
    document.getElementById("det_launchBtn").onclick = function(){ alert("已进入系统"); };
    var tc = document.getElementById("det_manualTree"); tc.innerHTML = "";
    mockDetailContent.manualTree.forEach(function(node, idx) {
        var a = document.createElement("a"); a.href = "javascript:void(0)";
        a.className = "tree-node" + (idx === 0 ? " active" : "");
        a.innerText = node.title;
        a.onclick = function() {
            document.querySelectorAll(".tree-node").forEach(function(n){ n.classList.remove("active"); });
            a.classList.add("active");
            document.getElementById("det_manualTitle").innerText = node.title;
            document.getElementById("det_manualBody").innerHTML = node.content;
        };
        tc.appendChild(a);
    });
    document.getElementById("det_manualTitle").innerText = mockDetailContent.manualTree[0].title;
    document.getElementById("det_manualBody").innerHTML = mockDetailContent.manualTree[0].content;
    var lc = document.getElementById("det_logTimeline"); lc.innerHTML = "";
    mockDetailContent.logs.forEach(function(log, idx) {
        var h = ""; log.items.forEach(function(li){ h += "<li>" + li + "</li>"; });
        var it = document.createElement("div");
        it.className = "timeline-item" + (idx === 0 ? " expanded" : "");
        it.innerHTML = "<div class=\"timeline-dot\"></div><div class=\"timeline-header\" onclick=\"this.parentElement.classList.toggle('expanded')\"><div class=\"timeline-title-left\"><span class=\"timeline-version\">" + log.version + "</span><span class=\"timeline-date\">" + log.date + "</span></div><div class=\"timeline-toggle-icon\">展开/折叠</div></div><div class=\"timeline-body\"><ul>" + h + "</ul></div>";
        lc.appendChild(it);
    });
    var cc = document.getElementById("det_courseGrid"); cc.innerHTML = "";
    mockDetailContent.courses.forEach(function(c) {
        var d = document.createElement("div"); d.className = "course-card";
        d.innerHTML = "<div class=\"course-thumb\"><span class=\"course-tag\">" + c.type + "</span><div class=\"course-title-text\">" + c.title + "</div></div><div class=\"course-info\"><div class=\"course-meta\">学习时长：" + c.duration + "</div><a href=\"javascript:void(0)\" class=\"btn-course\" onclick=\"alert('已开始学习')\">开始研习</a></div>";
        cc.appendChild(d);
    });
    document.getElementById("det_feedbackBanner").innerHTML = "📌 您的建议将直达聆听平台：【" + fc + "】分类 - 【" + ta.name + "】。";
    switchTab(defaultTab, document.querySelectorAll(".tab-btn")[defaultTab]);
    window.scrollTo(0, 0);
}

function switchTab(panelIndex, btnElement) {
            document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
            btnElement.classList.add("active");
            document.querySelectorAll(".tab-panel").forEach(panel => panel.classList.remove("active"));
            document.getElementById("panel-" + panelIndex).classList.add("active");
        }

        
function selectAdviceCard(element) {

            element.classList.add('active');

function loadAppDetailByName(appName) {
    var t = null;
    Object.keys(appsData).forEach(function(cat) {
        if (cat === "全部应用清单") return;
        (appsData[cat] || []).forEach(function(a) { if (a.name === appName) t = a; });
    });
    if (!t) {
        document.getElementById("det_appName").innerText = appName;
        document.getElementById("det_appDesc").innerText = "该应用的详细信息暂未录入。";
        document.getElementById("detailSection").style.display = "block";
        return;
    }
    loadAppDetail(t.id, 0);
}
