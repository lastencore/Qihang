  <script>
    const mountNode = document.getElementById('tiptap-local-poly-mount');
    mountNode.addEventListener('paste', (event) => {
        const text = event.clipboardData.getData('text/plain');
        if (/^\s*#|\[.*\]\(.*\)|^\s*-\s|^\s*\*\s|^\s*\d+\.\s|\*\*|__|> /m.test(text) || text.includes('\n- ') || text.includes('\n1. ')) {
            event.preventDefault();
            if (typeof marked !== 'undefined') {
                const htmlHtml = marked.parse(text);
                document.execCommand('insertHTML', false, htmlHtml);
            } else {
                document.execCommand('insertText', false, text);
            }
        }
    });
    function toggleStyle(cmd, value = null) {
        document.execCommand(cmd, false, value);
        mountNode.focus();
    }
    window.execLocalStyle = (type) => {
        if (type === 'bold') toggleStyle('bold');
        if (type === 'italic') toggleStyle('italic');
        if (type === 'underline') toggleStyle('underline');
        if (type === 'blockquote') toggleStyle('formatBlock', '<blockquote>');
        if (type === 'h1') toggleStyle('formatBlock', '<h1>');
        if (type === 'h2') toggleStyle('formatBlock', '<h2>');

<script>
var pmsMap = {
  "CB001": "A40105-车险承保平台",
  "CB002": "B40116-意健险承保平台",
  "CB003": "B40115-财责险承保平台",

  "ZJ001": "A50143-资金管理系统",
  "SJ003": "A70028-智慧决策平台",
  "YY004": "A50048-产品研发运营管理平台"
};

// 自动计算投产窗口次日中午12:00并格式化填入的方法
function calculateAutoPublishTime() {
  var isChecked = document.getElementById("isReleaseUpdate").checked;
  if (!isChecked) return;
  var windowValue = document.getElementById("releaseWindow").value;
  var publishDateInput = document.getElementById("publishDate");
  if (windowValue) {
    var dateMatch = windowValue.match(/^(\d{4}-\d{2}-\d{2})/);
    if (dateMatch) {
      var windowDateStr = dateMatch[1];
      var dateObj = new Date(windowDateStr);
      if (!isNaN(dateObj.getTime())) {
        dateObj.setDate(dateObj.getDate() + 1);
        var yyyy = dateObj.getFullYear();
        var mm = String(dateObj.getMonth() + 1).padStart(2, '0');
        var dd = String(dateObj.getDate()).padStart(2, '0');
        publishDateInput.value = yyyy + "-" + mm + "-" + dd + "T12:00";
      }
    }
  } else {
    publishDateInput.value = "";
  }
}

function toggleReleaseFields() {
  var c = document.getElementById("isReleaseUpdate").checked;
  var w = document.getElementById("releaseWindow");
  var p = document.getElementById("pmsSystem");
  var t = document.getElementById("publishDate");
  var container = document.getElementById("publishDatePickerContainer");
  var tip = document.getElementById("publishTimeTip");
  w.disabled = !c;
  w.style.background = c ? "#fff" : "#f5f5f5";
  w.style.color = c ? "rgba(0,0,0,.88)" : "rgba(0,0,0,.25)";
  p.style.background = "#f5f5f5";
  p.style.color = c ? "rgba(0,0,0,.65)" : "rgba(0,0,0,.25)";
  t.disabled = c;
  container.style.backgroundColor = c ? "#f5f5f5" : "#fff";
  if (c) {
    tip.innerText = "将于发布日次日中午12:00自动发布";
    tip.style.color = "#cc0000";
    calculateAutoPublishTime();
  } else {
    tip.innerText = "日志将在设定时间自动对外发布";
    tip.style.color = "rgba(0,0,0,0.45)";
    if (!w.value) { p.value = ""; }
  }
}

document.getElementById("releaseWindow").addEventListener("change", function() {
  calculateAutoPublishTime();
});

document.getElementById("appId").addEventListener("change", function() {
  var p = document.getElementById("pmsSystem");
  if (document.getElementById("isReleaseUpdate").checked) {
    p.value = pmsMap[this.value] || "";
  }
});

document.addEventListener("DOMContentLoaded", function() {
  toggleReleaseFields();
});
</script>
